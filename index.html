<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love 留言板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f8f0f4;color:#333;padding-bottom:60px}

/*登录*/
.login-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:999}
.login-box{background:#fff;padding:30px;border-radius:20px;width:100%;max-width:360px;text-align:center}
.login-box h2{color:#e88aa7;margin-bottom:20px}
.login-box input{width:100%;padding:12px;border:1px solid #eee;border-radius:12px;margin:10px 0}
.login-box button{background:#e88aa7;color:#fff;border:none;border-radius:12px;padding:12px 30px}
.hide{display:none !important}

/*主界面*/
.header{background:#fff;padding:16px;text-align:center;font-size:18px;font-weight:600;color:#e88aa7}
.top-info{display:flex;justify-content:space-between;padding:12px 20px;background:#fff;font-size:14px;color:#777}
.card{background:#fff;margin:16px;border-radius:16px;padding:20px}
.card h3{font-size:16px;color:#e88aa7;margin-bottom:12px}
.board-item{background:#fff6f9;padding:14px;border-radius:12px;margin:10px 0}
.footer{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:12px;border-top:1px solid #f0d8e0;display:flex;gap:10px}
.footer input{flex:1;border:1px solid #eee;border-radius:24px;padding:0 20px;height:44px}
.footer button{background:#e88aa7;color:#fff;border:none;border-radius:24px;padding:0 20px;height:44px}
</style>
</head>
<body>

<!--登录页-->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>Love 留言板</h2>
    <input type="password" id="pwd" placeholder="输入专属密码">
    <button onclick="login()">进入</button>
  </div>
</div>

<!--主界面-->
<div id="main" class="hide">
  <div class="header">Love · <span id="who"></span></div>
  <div class="top-info">
    <div>实时留言板</div>
    <div onclick="logout()" style="color:#e88aa7">退出</div>
  </div>

  <div class="card">
    <h3>💌 我们的留言板</h3>
    <div id="boardBox"></div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <input id="msgInput" placeholder="写下给对方的话...">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
let user = "";
// 用免费公共API存留言，双方刷新就能看到
const API = "https://api.jsonbin.io/v3/b/67e907358a45634503d8e195/latest";
const UPDATE_API = "https://api.jsonbin.io/v3/b/67e907358a45634503d8e195";
const headers = {
  "Content-Type": "application/json",
  "X-Master-Key": "$2a$10$K9hQdM8oX3b1Q0Y4L9R2K.e3oP8fQ7v5Z0X1W2V3"
};

// 登录
function login(){
  let p = document.getElementById("pwd").value.trim();
  if(p === "1124") user = "宁";
  else if(p === "1118") user = "曼";
  else return alert("密码错误");
  document.getElementById("loginPage").classList.add("hide");
  document.getElementById("main").classList.remove("hide");
  document.getElementById("who").innerText = user + "的留言板";
  loadBoard();
}
function logout(){
  user = "";
  document.getElementById("main").classList.add("hide");
  document.getElementById("loginPage").classList.remove("hide");
  document.getElementById("pwd").value = "";
}

// 加载留言
async function loadBoard(){
  try{
    let res = await fetch(API, {headers});
    let data = await res.json();
    let list = data.record?.list || [];
    let html = "";
    list.forEach(item => {
      html += `<div class="board-item">
        <div>${item.text}</div>
        <div style="font-size:11px;color:#999;margin-top:4px">${item.user} · ${item.time}</div>
      </div>`;
    });
    document.getElementById("boardBox").innerHTML = html;
  }catch(e){
    console.log("加载失败", e);
  }
}

// 发送留言
async function sendMsg(){
  let text = document.getElementById("msgInput").value.trim();
  if(!text) return;
  let t = new Date();
  let time = (t.getMonth()+1)+"月"+t.getDate()+"日 "+t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

  try{
    // 先获取现有留言
    let res = await fetch(API, {headers});
    let data = await res.json();
    let list = data.record?.list || [];
    // 添加新留言
    list.push({user, text, time});
    // 更新到云端
    await fetch(UPDATE_API, {
      method: "PUT",
      headers,
      body: JSON.stringify({list})
    });
    document.getElementById("msgInput").value = "";
    loadBoard();
  }catch(e){
    alert("发送失败，请重试");
    console.log(e);
  }
}

// 每10秒自动刷新一次，对方发的留言会自动显示
setInterval(loadBoard, 10000);
</script>
</body>
</html>
