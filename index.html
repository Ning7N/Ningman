<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love 双人聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:#f8f0f4;color:#333;padding-bottom:120px}

/*登录*/
.login-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:999}
.login-box{background:#fff;padding:30px;border-radius:20px;width:100%;max-width:360px;text-align:center}
.login-box h2{color:#e88aa7;margin-bottom:20px}
.login-box input{width:100%;padding:12px;border:1px solid #eee;border-radius:12px;margin:10px 0}
.login-box button{background:#e88aa7;color:#fff;border:none;border-radius:12px;padding:12px 30px}
.tip{font-size:12px;color:#999;margin-top:15px;display:none;}
.hide{display:none !important}

/*顶部*/
.header{background:#fff;padding:16px;text-align:center;font-size:18px;font-weight:600;color:#e88aa7}
.top-info{display:flex;justify-content:space-between;padding:12px 20px;background:#fff;font-size:14px;color:#777}

/*聊天*/
.chat{padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:75%;padding:12px 16px;border-radius:18px;font-size:14px}
.msg-me{background:#e88aa7;color:#fff;align-self:flex-end;border-bottom-right-radius:6px}
.msg-other{background:#fff;border:1px solid #f0d8e0;align-self:flex-start;border-bottom-left-radius:6px}
.msg img{max-width:200px;border-radius:12px;margin:4px 0}
.msg-time{font-size:11px;opacity:0.7;margin-top:4px}

/*底部输入*/
.footer{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:12px;border-top:1px solid #f0d8e0;display:flex;gap:10px;align-items:center}
.footer input{flex:1;border:1px solid #eee;border-radius:24px;padding:0 20px;height:44px}
.footer button{border-radius:24px;padding:0 16px;height:44px;border:none;background:#e88aa7;color:#fff}
.img-btn{width:44px;height:44px;border-radius:50%;border:1px solid #e88aa7;background:#fff;color:#e88aa7;font-size:18px}
#fileInput{display:none}
</style>
</head>
<body>

<!--登录页-->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>Love 双人聊天</h2>
    <input type="password" id="pwd" placeholder="输入专属密码">
    <button onclick="login()">进入聊天</button>
    <div class="tip">宁：1124 &nbsp; 曼：1118</div>
  </div>
</div>

<!--主页面-->
<div id="main" class="hide">
  <div class="header">Love · <span id="who"></span></div>
  <div class="top-info">
    <div>实时互通聊天</div>
    <div onclick="logout()" style="color:#e88aa7">退出</div>
  </div>

  <div class="chat" id="chatBox"></div>

  <!--底部：图片+输入+发送-->
  <div class="footer">
    <input type="file" id="fileInput" accept="image/*" onchange="sendImg(event)">
    <button class="img-btn" onclick="fileInput.click()">📷</button>
    <input id="txtInput" placeholder="发文字 / 发图片">
    <button onclick="sendTxt()">发送</button>
  </div>
</div>

<script>
let user = "";
const fileInput = document.getElementById("fileInput");

//数据存取
function get(){
  let d = localStorage.getItem("loveChatData");
  return d ? JSON.parse(d) : {list:[]};
}
function set(d){
  localStorage.setItem("loveChatData",JSON.stringify(d));
}

//登录（已改密码）
function login(){
  let p = document.getElementById("pwd").value.trim();
  if(p==="1124")user="宁";
  else if(p==="1118")user="曼";
  else return alert("密码错误");
  document.getElementById("loginPage").classList.add("hide");
  document.getElementById("main").classList.remove("hide");
  document.getElementById("who").innerText=user+"的聊天";
  render();
}
function logout(){
  user="";
  document.getElementById("main").classList.add("hide");
  document.getElementById("loginPage").classList.remove("hide");
  document.getElementById("pwd").value="";
}

//发文字
function sendTxt(){
  let txt = document.getElementById("txtInput").value.trim();
  if(!txt)return;
  let d=get();
  let t=new Date();
  let time = t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
  d.list.push({u:user,type:"text",val:txt,time});
  set(d);
  document.getElementById("txtInput").value="";
  render();
}

//发图片（本地选图转base64存本地，双方打开都能看见）
function sendImg(e){
  let f = e.target.files[0];
  if(!f)return;
  let reader = new FileReader();
  reader.readAsDataURL(f);
  reader.onload=function(){
    let d=get();
    let t=new Date();
    let time = t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
    d.list.push({u:user,type:"img",val:reader.result,time});
    set(d);
    render();
    fileInput.value="";
  }
}

//渲染聊天
function render(){
  let d=get();
  let html="";
  d.list.forEach(x=>{
    let clz = x.u===user ? "msg-me" : "msg-other";
    if(x.type==="text"){
      html+=`<div class="msg ${clz}">${x.val}<div class="msg-time">${x.u} ${x.time}</div></div>`;
    }else{
      html+=`<div class="msg ${clz}"><img src="${x.val}"><div class="msg-time">${x.u} ${x.time}</div></div>`;
    }
  });
  document.getElementById("chatBox").innerHTML=html;
  //滚动到底
  window.scrollTo(0,document.body.scrollHeight);
}
</script>
</body>
</html>
