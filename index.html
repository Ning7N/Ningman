<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body {
  background: #f8f0f4;
  color: #333;
  padding-bottom: 110px;
}
.header {
  background: #fff;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: #e88aa7;
}
.top-info {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  background: #fff;
  font-size: 14px;
  color: #777;
}
.card {
  background: #fff;
  margin: 16px;
  border-radius: 16px;
  padding: 20px;
}
.card h3 {
  font-size: 16px;
  color: #e88aa7;
  margin-bottom: 12px;
}
.chat-area {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
}
.msg-ning {
  background: #e88aa7;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}
.msg-man {
  background: white;
  border: 1px solid #f0d8e0;
  align-self: flex-start;
  border-bottom-left-radius: 6px;
}
.msg-time {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 4px;
}
.board-item {
  background: #fff6f9;
  padding: 14px;
  border-radius: 12px;
  margin: 10px 0;
}
.footer-input {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: white;
  padding: 12px;
  border-top: 1px solid #f0d8e0;
  display: flex;
  gap: 10px;
}
.footer-input input {
  flex: 1;
  border: 1px solid #eee;
  border-radius: 24px;
  padding: 0 20px;
  height: 44px;
  font-size: 14px;
}
.footer-input button {
  background: #e88aa7;
  color: white;
  border: none;
  border-radius: 24px;
  padding: 0 20px;
}
</style>
</head>
<body>
<div class="header">Love</div>
<div class="top-info">
  <div>爱心余额：<span id="loveNum">0</span></div>
  <div>甜蜜兑换：<span id="logNum">0</span> 次</div>
</div>

<div class="chat-area" id="chatBox"></div>

<div class="card">
  <h3>💌 悄悄话留言板</h3>
  <div id="boardBox"></div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <input id="boardInputTxt" placeholder="写下悄悄话..." style="flex:1;border:1px solid #eee;border-radius:22px;padding:0 14px;height:40px">
    <button style="background:#e88aa7;color:white;border:none;border-radius:22px;padding:0 14px;height:40px" onclick="addLoveBoard()">留言</button>
  </div>
</div>

<div class="footer-input">
  <input id="sendMsgInput" placeholder="发消息自动攒爱心✨">
  <button onclick="sendLoveMsg()">发送</button>
</div>

<script>
function getSaveData(){
  let old = localStorage.getItem("loveChatData");
  if(!old){
    return {
      love: 0,
      log: 0,
      msgList: [],
      boardList: []
    };
  }
  return JSON.parse(old);
}
function setSaveData(obj){
  localStorage.setItem("loveChatData", JSON.stringify(obj));
}

function sendLoveMsg(){
  let input = document.getElementById("sendMsgInput");
  let txt = input.value.trim();
  if(!txt) return;
  let d = getSaveData();
  let who = confirm("本条消息是【宁】发送的吗？") ? "ning" : "man";
  let h = new Date().getHours();
  let m = String(new Date().getMinutes()).padStart(2, "0");
  let timeStr = h + ":" + m;

  d.love += 1;
  d.msgList.push({role: who, text: txt, time: timeStr});
  setSaveData(d);
  input.value = "";
  refreshAllView();
}

function addLoveBoard(){
  let input = document.getElementById("boardInputTxt");
  let txt = input.value.trim();
  if(!txt) return;
  let d = getSaveData();
  let who = confirm("本条留言是【宁】写的吗？") ? "宁" : "曼";
  let mon = new Date().getMonth() + 1;
  let day = new Date().getDate();
  let timeStr = mon + "月" + day + "日";

  d.boardList.push({user: who, text: txt, time: timeStr});
  setSaveData(d);
  input.value = "";
  refreshAllView();
}

function refreshAllView(){
  let d = getSaveData();
  document.getElementById("loveNum").innerText = d.love;
  document.getElementById("logNum").innerText = d.log;

  let chatHtml = "";
  d.msgList.forEach(item => {
    if(item.role === "ning"){
      chatHtml += `<div class="msg msg-ning">${item.text}<div class="msg-time">${item.time}</div></div>`;
    } else {
      chatHtml += `<div class="msg msg-man">${item.text}<div class="msg-time">${item.time}</div></div>`;
    }
  });
  document.getElementById("chatBox").innerHTML = chatHtml;

  let boardHtml = "";
  d.boardList.forEach(item => {
    boardHtml += `<div class="board-item"><div style="font-size:14px">${item.text}</div><div style="font-size:11px;color:#999;margin-top:4px">${item.user} · ${item.time}</div></div>`;
  });
  document.getElementById("boardBox").innerHTML = boardHtml;
}

refreshAllView();
</script>
</body>
</html>
